<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tagesablauf">
<title>Tagesablauf v12 — Bioenergetische Frequenzarbeit</title>
<style>
  :root {
    --royal:    #1565C0;
    --dunkel:   #0D3E6A;
    --hellblau: #D6E8F7;
    --akzent:   #42A5F5;
    --weiss:    #FFFFFF;
    --grau:     #F5F8FB;
    --text:     #2C2C2C;
    --gruen:    #2E9E5B;
    --gruen-bg: #E6F6EC;
    --rot:      #C0392B;
    --rot-bg:   #FDECEC;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--grau);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    text-align: center;
  }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    background: var(--royal);
    color: var(--weiss);
    padding: 0.9rem 1rem 0.5rem;
    box-shadow: 0 2px 10px rgba(13,62,106,0.28);
    position: sticky; top: 0; z-index: 100;
    overflow: hidden;
  }
  header::before {
    content:''; position:absolute; top:-180px; right:-180px;
    width:360px; height:360px; border-radius:50%;
    border:1px solid #0D47A1; opacity:0.6; pointer-events:none;
  }
  header .top { position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:0.8rem; }
  header .logo { width:52px; height:52px; display:block; flex-shrink:0; }
  header .brand .praxis { font-size:0.95rem; font-weight:700; margin:0; letter-spacing:0.3px; text-shadow:0 1px 0 rgba(0,0,0,0.35); }
  header .brand .inhaber { font-size:0.72rem; margin:0.05rem 0; opacity:0.92; }
  header .brand .titel { font-size:1.15rem; font-weight:700; margin:0.15rem 0 0; text-shadow:0 2px 2px rgba(0,0,0,0.4); }
  header .accent { position:relative; z-index:2; height:3px; background:var(--akzent); margin:0.55rem -1rem 0; box-shadow:0 3px 0 #64B5F6; }

  main { max-width:620px; margin:0 auto; padding:1rem 0.9rem 5rem; }

  /* ─── TABS ─── */
  .tabs { display:flex; gap:0.22rem; margin:0.2rem 0 1rem; }
  .tab { flex:1 1 0; min-width:0; text-align:center; padding:0.5rem 0.05rem; border-radius:9px;
    background:var(--weiss); border:1px solid #cdd9e6; color:var(--dunkel);
    font-size:0.72rem; font-weight:700; cursor:pointer; user-select:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tab.active { background:var(--royal); color:#fff; border-color:var(--royal); }

  .datum { font-size:0.85rem; color:#4a5b70; margin:0 0 0.7rem; text-transform:capitalize; }

  .card { background:var(--weiss); border:1px solid #d9e5f2; border-radius:14px; padding:0.9rem 1rem; margin-bottom:1rem; }
  .card-h { font-weight:800; color:var(--royal); font-size:0.92rem; margin-bottom:0.6rem; }
  .card-sub { font-size:0.8rem; color:#5a6b7a; line-height:1.4; margin-bottom:0.6rem; }
  .grp-h { font-size:0.74rem; font-weight:800; color:var(--dunkel); text-transform:uppercase; letter-spacing:0.05em; text-align:left; margin:0.9rem 0 0.4rem; opacity:0.75; }
  .grp-h:first-of-type { margin-top:0.2rem; }

  /* ─── KACHELN ─── */
  .kgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.4rem; }
  .kachel { background:#f4f9fe; border:1.5px solid var(--hellblau); border-radius:12px; padding:0.55rem 0.15rem; cursor:pointer; transition:transform .08s, background .12s; }
  .kachel:active { background:var(--hellblau); transform:scale(0.95); }
  .kachel .kic { font-size:1.45rem; display:block; line-height:1.35; }
  .kachel .knm { font-size:0.68rem; font-weight:700; color:var(--dunkel); display:block; line-height:1.2; hyphens:auto; }
  .kachel.heute-getan { background:var(--gruen-bg); border-color:#b7e3c6; }
  .kachel.add { background:#fff; border-style:dashed; border-color:var(--akzent); }
  .kachel .kzt { display:block; font-size:0.6rem; color:var(--gruen); font-weight:700; }

  /* ─── SCHUB ─── */
  .schub-card { border:1.5px solid #E7A9A2; background:var(--rot-bg); }
  .schub-card.ruhig { border:1.5px solid #d9e5f2; background:var(--weiss); }
  .schub-lbl { font-size:0.8rem; color:#8a3b30; font-weight:800; letter-spacing:0.03em; text-transform:uppercase; }
  .schub-uhr { font-size:2.4rem; font-weight:800; color:var(--rot); line-height:1.15; font-variant-numeric:tabular-nums; }
  .schub-seit { font-size:0.8rem; color:#8a3b30; }
  .zseg { display:flex; gap:0.3rem; }
  .zb { flex:1; padding:0.7rem 0.15rem; border-radius:11px; border:1.5px solid #cdd9e6; background:#fff;
        font-size:0.83rem; font-weight:800; color:var(--dunkel); cursor:pointer; }
  .zb.on.ruhe    { background:var(--gruen); color:#fff; border-color:var(--gruen); }
  .zb.on.kribbel { background:#E8A400; color:#fff; border-color:#E8A400; }
  .zb.on.schub   { background:var(--rot); color:#fff; border-color:var(--rot); }
  .kribbel-card { border:1.5px solid #F1D08A !important; background:#FFF8EA !important; }
  .beine-card { border:1.5px solid var(--hellblau); }
  .beine-card.aktiv { border:1.5px solid #E7A9A2; background:#FFFBFA; }
  .bz { display:flex; align-items:center; justify-content:space-between; gap:0.5rem;
        padding:0.55rem 0; border-top:1px solid #eef2f7; }
  .bz:first-of-type { border-top:none; }
  .bz.nolines { border-top:1px solid #eef2f7; padding-bottom:0.3rem; }
  .bz-l { font-size:0.95rem; font-weight:800; color:var(--dunkel); text-align:left; }
  .bz-l small { display:block; font-size:0.7rem; font-weight:600; color:#8494a4; }
  .bz-r { display:flex; gap:0.3rem; flex-shrink:0; }
  .tg { min-width:3.4rem; text-align:center; padding:0.5rem 0.6rem; border-radius:10px;
        border:1.5px solid #cdd9e6; background:#fff; font-size:0.85rem; font-weight:800; color:#8494a4; cursor:pointer; }
  .tg.on.nein  { background:#eef2f7; color:#5a6b7c; border-color:#cdd9e6; }
  .tg.on.ja    { background:var(--rot); color:#fff; border-color:var(--rot); }
  .tg.on.gruen { background:var(--gruen); color:#fff; border-color:var(--gruen); }
  .bz-uhr { font-size:0.82rem; font-weight:700; text-align:right; margin:-0.2rem 0 0.3rem; font-variant-numeric:tabular-nums; }
  .bz-uhr.rot { color:var(--rot); }
  .bz-uhr.gruen { color:var(--gruen); }
  .rauch-card { border:1.5px solid #E4C79E; background:#FFFBF4; }
  .rauch-top { margin-bottom:0.5rem; }
  .rauch-zahl { font-size:2.1rem; font-weight:800; color:#8a5a2a; line-height:1.1; font-variant-numeric:tabular-nums; }
  .rauch-lbl { font-size:0.78rem; color:#a07a4a; }
  .rauch-b { flex:1; text-align:center; padding:0.75rem 0.3rem; border-radius:12px; border:1.5px solid #C89A5B;
             background:#F7E9D4; color:#7a4e1a; font-size:0.92rem; font-weight:800; cursor:pointer; }
  .rauch-b:active { background:#EFD9B8; }
  .rauch-b.halb { background:#fff; }
  .bein-h { font-size:0.84rem; font-weight:800; color:var(--dunkel); text-align:left; margin:0.7rem 0 0.3rem; }
  .bein-h:first-of-type { margin-top:0.2rem; }
  .bein-alt { font-size:0.72rem; font-weight:600; color:#8494a4; }
  .int-b.on.blau { background:var(--royal); border-color:var(--royal); color:#fff; }
  .qual-h { font-size:0.78rem; font-weight:700; color:#6a7a8c; margin:0.8rem 0 0.35rem; }
  .tl-row.ep.kr { background:#FFF6E5; }
  .tl-row.ep.kr .tl-t { color:#C77700; }
  .big-btn { width:100%; padding:0.95rem; border:none; border-radius:14px; font-size:1.02rem; font-weight:800; cursor:pointer; }
  .big-btn.start { background:var(--rot); color:#fff; box-shadow:0 4px 12px rgba(192,57,43,0.25); }
  .big-btn.stop { background:var(--dunkel); color:#fff; }
  .link-btn { background:none; border:none; color:var(--royal); font-size:0.8rem; font-weight:700; text-decoration:underline; cursor:pointer; padding:0.5rem; }
  .int-row { display:flex; gap:0.25rem; margin:0.5rem 0 0.2rem; }
  .int-b { flex:1; padding:0.45rem 0; border-radius:8px; border:1.5px solid #cdd9e6; background:#fff; font-size:0.82rem; font-weight:700; color:var(--dunkel); cursor:pointer; }
  .int-b.on { background:var(--rot); color:#fff; border-color:var(--rot); }
  .int-lbl { display:flex; justify-content:space-between; font-size:0.7rem; color:#8494a4; }

  /* ─── ZEITLEISTE ─── */
  .tl { text-align:left; }
  .tl-row { display:flex; gap:0.55rem; align-items:flex-start; padding:0.45rem 0.2rem; border-top:1px solid #eef2f7; cursor:pointer; }
  .tl-row:first-child { border-top:none; }
  .tl-t { width:3rem; flex-shrink:0; font-size:0.8rem; font-weight:700; color:var(--dunkel); font-variant-numeric:tabular-nums; }
  .tl-ic { width:1.4rem; flex-shrink:0; font-size:1rem; text-align:center; }
  .tl-b { flex:1; font-size:0.86rem; color:var(--text); }
  .tl-b small { display:block; font-size:0.76rem; color:#8494a4; line-height:1.35; }
  .tl-row.ep { background:var(--rot-bg); border-radius:8px; border-top-color:transparent; padding:0.5rem; margin:0.25rem 0; }
  .tl-row.ep .tl-t { color:var(--rot); }
  .tl-luecke { font-size:0.68rem; color:#b8c4d0; text-align:left; padding:0.05rem 0 0.05rem 3.55rem; }

  /* ─── TOAST ─── */
  .toast { position:fixed; left:50%; bottom:1.1rem; transform:translateX(-50%); z-index:9998;
    background:var(--dunkel); color:#fff; border-radius:999px; padding:0.55rem 0.9rem;
    font-size:0.84rem; font-weight:700; box-shadow:0 8px 24px rgba(13,62,106,0.35);
    display:flex; align-items:center; gap:0.7rem; max-width:92vw; }
  .toast u { cursor:pointer; color:#BBDEFB; font-weight:700; }

  /* ─── AUSWERTUNG ─── */
  .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.5rem; }
  .stat { background:#f4f9fe; border:1px solid var(--hellblau); border-radius:10px; padding:0.55rem; }
  .stat .sv { font-size:1.2rem; font-weight:800; color:var(--dunkel); }
  .stat .sl { font-size:0.71rem; color:#6a7a8c; }
  .win-row { display:flex; gap:0.3rem; margin-bottom:0.7rem; }
  .win-b { flex:1; padding:0.4rem 0; border-radius:8px; border:1.5px solid #cdd9e6; background:#fff; font-size:0.78rem; font-weight:700; color:var(--dunkel); cursor:pointer; }
  .win-b.on { background:var(--royal); color:#fff; border-color:var(--royal); }
  .frow { text-align:left; padding:0.5rem 0; border-top:1px solid #eef2f7; font-size:0.84rem; }
  .frow:first-of-type { border-top:none; }
  .frow .fh { display:flex; justify-content:space-between; align-items:baseline; gap:0.5rem; }
  .frow .fn { font-weight:700; color:var(--dunkel); }
  .frow .fv { font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .frow .fd { font-size:0.75rem; color:#8494a4; margin-top:0.1rem; line-height:1.4; }
  .fbar { height:7px; background:#E4ECF5; border-radius:99px; overflow:hidden; margin-top:0.28rem; display:flex; }
  .fbar > span { display:block; height:100%; background:linear-gradient(90deg,var(--royal),var(--akzent)); }
  .fbar.warn > span { background:linear-gradient(90deg,#C0392B,#E8735F); }
  .fbar.good > span { background:linear-gradient(90deg,#2E9E5B,#63C68B); }
  .chart { display:flex; align-items:flex-end; gap:2px; height:104px; margin:0.4rem 0 0.2rem; }
  .chart .cb { flex:1; background:#E4ECF5; border-radius:3px 3px 0 0; display:flex; align-items:flex-end; }
  .chart .cb > i { display:block; width:100%; background:linear-gradient(180deg,var(--akzent),var(--royal)); border-radius:3px 3px 0 0; }
  .chart-x { display:flex; gap:2px; font-size:0.58rem; color:#8494a4; }
  .chart-x span { flex:1; text-align:center; }
  .vs { text-align:left; border:1px solid #f3c9c9; background:#FFF7F6; border-radius:10px; padding:0.5rem 0.65rem; margin-bottom:0.45rem; }
  .vs-h { font-size:0.84rem; font-weight:800; color:var(--rot); margin-bottom:0.25rem; }
  .vs-l { font-size:0.8rem; color:#5c6b7a; line-height:1.5; }
  .vs-d { margin-top:0.3rem; padding-top:0.3rem; border-top:1px dashed #f0c9c9; }
  .vs-d .vs-l b { color:var(--gruen); }
  .vs-l b { color:var(--dunkel); font-variant-numeric:tabular-nums; }
  .hint { font-size:0.77rem; color:#8494a4; line-height:1.45; text-align:left; }
  .merk { text-align:left; background:var(--rot-bg); border:1px solid #f3c9c9; border-radius:10px; padding:0.55rem 0.7rem; margin-bottom:0.4rem; font-size:0.84rem; color:#8a2b22; line-height:1.45; }
  .merk.gut { background:var(--gruen-bg); border-color:#cfe8cf; color:#2b5b3a; }

  /* ─── VERLAUF ─── */
  .vrow { display:flex; align-items:center; gap:0.6rem; background:var(--weiss); border:1px solid #d9e5f2; border-radius:10px; padding:0.5rem 0.7rem; margin-bottom:0.35rem; cursor:pointer; }
  .vrow .vday { width:92px; flex-shrink:0; font-size:0.8rem; color:var(--dunkel); font-weight:600; text-align:left; }
  .vrow .vday.heute { color:var(--royal); font-weight:800; }
  .vrow .vbar { flex:1; height:9px; background:#E4ECF5; border-radius:99px; overflow:hidden; }
  .vrow .vbar > span { display:block; height:100%; background:linear-gradient(90deg,var(--royal),#C0392B); }
  .vrow .vbar.frei > span { background:var(--gruen); }
  .vrow .vnum { width:66px; text-align:right; font-size:0.75rem; color:#6a7a8c; flex-shrink:0; font-variant-numeric:tabular-nums; }
  .vdet { background:#fff; border:1px solid #d9e5f2; border-radius:10px; padding:0.5rem 0.7rem; margin:-0.15rem 0 0.5rem; }

  /* ─── MODAL ─── */
  .ui-ov { position:fixed; inset:0; background:rgba(15,30,50,0.5); display:flex; align-items:center; justify-content:center; z-index:9999; padding:0.8rem; }
  .ui-box { background:#fff; border-radius:16px; padding:1.1rem 1rem; max-width:420px; width:100%; box-shadow:0 14px 44px rgba(0,0,0,0.28); max-height:92vh; overflow:auto; text-align:left; }
  .ui-box h3 { margin:0 0 0.2rem; color:var(--dunkel); font-size:1.05rem; text-align:center; }
  .ui-box .sub { font-size:0.8rem; color:#8494a4; text-align:center; margin-bottom:0.8rem; }
  .ui-msg { font-size:0.95rem; color:#21364a; line-height:1.45; white-space:pre-line; margin-bottom:1rem; }
  .field { margin-bottom:0.7rem; }
  .field label { display:block; font-size:0.76rem; font-weight:700; color:var(--dunkel); margin-bottom:0.25rem; }
  .field input, .field select, .field textarea { width:100%; padding:0.55rem 0.6rem; border:1.5px solid #cdd9e6; border-radius:10px; font-size:0.92rem; font-family:inherit; color:var(--text); background:#fff; }
  .field input:focus, .field textarea:focus, .field select:focus { outline:none; border-color:var(--akzent); }
  .chips { display:flex; flex-wrap:wrap; gap:0.3rem; }
  .chip { padding:0.4rem 0.6rem; border-radius:999px; border:1.5px solid var(--hellblau); background:#f4f9fe; color:var(--dunkel); font-size:0.82rem; font-weight:600; cursor:pointer; }
  .chip.on { background:var(--royal); color:#fff; border-color:var(--royal); }
  .ui-btns { display:flex; gap:0.5rem; margin-top:0.9rem; position:sticky; bottom:-1.1rem; background:#fff; padding:0.5rem 0 0.2rem; }
  .ui-btns button { flex:1; padding:0.7rem 0.3rem; border-radius:11px; border:none; font-size:0.88rem; font-weight:700; cursor:pointer; }
  .ui-no { background:#e9eef3; color:#41566b; }
  .ui-yes { background:var(--royal); color:#fff; }
  .ui-del { background:var(--rot-bg); color:var(--rot); }

  textarea.ber { width:100%; border:1.5px solid var(--hellblau); border-radius:10px; padding:0.55rem 0.6rem;
    font-family:'Courier New',monospace; font-size:0.68rem; line-height:1.45; color:#41566b; background:#fbfdff; resize:vertical; }
  .merken { display:flex; align-items:center; gap:0.45rem; font-size:0.78rem; color:#5a6b7a; margin:-0.3rem 0 0.7rem; cursor:pointer; }
  .merken input { width:auto; }
  .a-btn2 { flex:1; text-align:center; padding:0.6rem; border-radius:10px; border:1.5px solid var(--royal); background:#eef6fd; color:var(--royal); font-size:0.84rem; font-weight:700; cursor:pointer; }
  .btn-row { display:flex; gap:0.5rem; margin-top:0.5rem; }
  .backup-status { font-size:0.78rem; color:#256b3b; font-weight:700; margin-top:0.5rem; min-height:1em; }
  .reset-all { font-size:0.82rem; color:var(--rot); background:none; border:none; text-decoration:underline; cursor:pointer; padding:0.5rem; }
  .empty { padding:1.8rem 1rem; color:#7a8a99; }
  .empty .big { font-size:2.2rem; margin-bottom:0.4rem; }
  .empty p { margin:0.3rem 0; font-size:0.9rem; }

  footer { font-size:0.68rem; color:#9aa7b5; padding:1.4rem 1rem 0; line-height:1.5; }
</style>
</head>
<body>

function standardDauer(name){
  const d = dauerMap();
  if(d[name] !== undefined) return d[name];
  const i = itemInfo(name);
  return i.dauer || 0;

function endeVon(v){ return v.ts + (v.dauer||0)*60000; }

const RAUCH = [{n:'Zigarette', ic:'🚬', t:['Nikotin']}, {n:'Halbe Zigarette', ic:'🚬', t:['Nikotin']}];
function itemInfo(name){
  let f = RAUCH.find(x=>x.n===name) || null;
  if(f) return f;
  gruppen().forEach(g=>g.items.forEach(i=>{ if(i.n===name) f = i; }));
  if(f) return f;
  essenKatalog().forEach(g=>g.items.forEach(i=>{ if(i.n===name) f = i; }));
  return f || {n:name, ic:'•', t:[]};
}

function p2(n){ return n<10 ? '0'+n : ''+n; }
function dkey(ts){ const d=new Date(ts); return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function fmtT(ts){ const d=new Date(ts); return p2(d.getHours())+':'+p2(d.getMinutes()); }
function heuteKey(){ return dkey(Date.now()); }
function dauerTxt(ms){
  const m = Math.round(ms/60000);
  if(m < 60) return m+' Min';
  return Math.floor(m/60)+' h '+p2(m%60)+' Min';
}
function uhrTxt(ms){
  const s = Math.floor(ms/1000);
  return p2(Math.floor(s/3600))+':'+p2(Math.floor(s/60)%60)+':'+p2(s%60);
}
function toLocalInput(ts){
  const d=new Date(ts);
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes());
}

function schuebeSort(){ return D.schuebe.filter(x=>art(x)==='schub').sort((a,b)=>a.s-b.s); }
function kribbelPhasen(){ return D.schuebe.filter(x=>art(x)==='kribbel').sort((a,b)=>a.s-b.s); }
function laufender(){ return D.schuebe.find(x=>!x.e); }
function laufenderArt(a){ return D.schuebe.find(x=>!x.e && art(x)===a) || null; }
function laufende(){ return D.schuebe.filter(x=>!x.e); }

function schEnde(x){ return x.e || Date.now(); }
function schDauer(x){ return Math.max(0, schEnde(x)-x.s); }

/* ═══════════════ MODAL / TOAST ═══════════════ */
let modalEl = null;
function modal(html, onOpen){
  closeModal();
  modalEl = document.createElement('div');
  modalEl.className = 'ui-ov';
  modalEl.innerHTML = '<div class="ui-box">'+html+'</div>';
  modalEl.addEventListener('click', e=>{ if(e.target===modalEl) closeModal(); });
  document.body.appendChild(modalEl);
  if(onOpen) onOpen(modalEl);
}
function closeModal(){ if(modalEl){ modalEl.remove(); modalEl=null; } }
function frage(text, ja, cb){
  modal('<div class="ui-msg">'+esc(text)+'</div><div class="ui-btns"><button class="ui-no" id="qN">Abbrechen</button><button class="ui-yes" id="qJ">'+esc(ja)+'</button></div>',
    el=>{ el.querySelector('#qN').onclick=closeModal; el.querySelector('#qJ').onclick=()=>{ closeModal(); cb(); }; });
}
function info(text){
  modal('<div class="ui-msg">'+esc(text)+'</div><div class="ui-btns"><button class="ui-yes" id="qJ">OK</button></div>',
    el=>{ el.querySelector('#qJ').onclick=closeModal; });
}
let toastEl = null, toastTimer = null;
function toast(text, undoId){
  if(toastEl) toastEl.remove();
  if(toastTimer) clearTimeout(toastTimer);
  toastEl = document.createElement('div');
  toastEl.className = 'toast';
  toastEl.innerHTML = '<span>'+esc(text)+'</span>' + (undoId ? '<u id="tzurueck">rückgängig</u>' : '');
  document.body.appendChild(toastEl);
  if(undoId) document.getElementById('tzurueck').onclick = ()=>{
    D.eintraege = D.eintraege.filter(x=>x.id!==undoId);
    save(); toastEl.remove(); toastEl=null; render(true);
  };
  toastTimer = setTimeout(()=>{ if(toastEl){ toastEl.remove(); toastEl=null; } }, 4000);
}

/* ═══════════════ RENDER ═══════════════ */
let modus = 'heute';
let liveTimer = null;
const TITEL = { heute:'Tagesablauf · Heute', muster:'Tagesablauf · Muster', bericht:'Tagesablauf · Analyse', verlauf:'Tagesablauf · Verlauf', daten:'Tagesablauf · Daten' };
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    modus = t.dataset.mode;
    render();
  };
});
function render(keepScroll){
  const y = window.scrollY;
  document.getElementById('headTitel').textContent = TITEL[modus];
  if(liveTimer){ clearInterval(liveTimer); liveTimer=null; }
  const c = document.getElementById('content');
  if(modus==='heute') c.innerHTML = viewHeute();
  else if(modus==='muster') c.innerHTML = viewMuster();
  else if(modus==='bericht') c.innerHTML = viewBericht();
  else if(modus==='verlauf') c.innerHTML = viewVerlauf();
  else c.innerHTML = viewDaten();
  if(modus==='heute' && laufende().length) startLive();
  window.scrollTo(0, keepScroll ? y : 0);
}
function startLive(){
  const tick = ()=>{
    const lf = laufende();
    if(!lf.length){ clearInterval(liveTimer); liveTimer=null; return; }
    lf.forEach(p=>{
      const el = document.getElementById('uhr_'+p.id);
      if(el) el.textContent = uhrTxt(Date.now()-p.s);
    });
  };
  tick(); liveTimer = setInterval(tick, 1000);
}

/* ═══════════════ ANSICHT: HEUTE ═══════════════ */
function viewHeute(){
  const d = new Date();
  let h = '<p class="datum">'+TAGE[d.getDay()]+', '+d.getDate()+'. '+MONATE[d.getMonth()]+' '+d.getFullYear()+'</p>';
  h += schubKarte();
  h += rauchKarte();
  h += '<div class="card"><div class="card-h">Tippen = Zeit ist gespeichert</div>';
  gruppen().forEach(g=>{
    h += '<div class="grp-h">'+esc(g.n)+'</div><div class="kgrid">';
    h += g.items.map(i=>kachel(g.id, i)).join('');
    h += '<div class="kachel add" onclick="eigenesAnlegen(\''+g.id+'\')"><span class="kic">＋</span><span class="knm">Eigenes</span></div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="card"><div class="card-h">Zeitleiste heute</div>' + timelineHTML(heuteKey()) + '</div>';
  return h;
}
function rauchEintraege(){ return D.eintraege.filter(v=>v.grp==='rauchen'); }
function rauchHeute(){ return rauchEintraege().filter(v=>dkey(v.ts)===heuteKey()).sort((a,b)=>a.ts-b.ts); }
function rauchWert(v){ return v.item==='Halbe Zigarette' ? 0.5 : 1; }
function rauchen(halb){
  const nm = halb ? 'Halbe Zigarette' : 'Zigarette';
  const ev = {id:uid(), ts:Date.now(), item:nm, grp:'rauchen', liste:[], tags:['Nikotin'], detail:''};
  D.eintraege.push(ev); save();
  toast('🚬 '+nm+' · '+fmtT(ev.ts)+(schubZu(ev.ts)?' · im Schub':''), ev.id);
  render(true);
}
function rauchKarte(){
  const heute = rauchHeute();
  const anzahl = heute.reduce((a,v)=>a+rauchWert(v),0);
  const ganze = heute.filter(v=>v.item==='Zigarette').length;
  const halbe = heute.filter(v=>v.item==='Halbe Zigarette').length;
  const letzte = heute.length ? heute[heute.length-1] : null;
  const seit = letzte ? Date.now()-letzte.ts : null;
  const tage = tagListe(), proTag = {};
  rauchEintraege().forEach(v=>{ proTag[dkey(v.ts)] = (proTag[dkey(v.ts)]||0)+rauchWert(v); });
  const letzte7 = tage.slice(-7);
  const schnitt7 = letzte7.length ? letzte7.reduce((a,k)=>a+(proTag[k]||0),0)/letzte7.length : 0;
  return '<div class="card rauch-card">'
    + '<div class="rauch-top">'
      + '<div class="rauch-zahl">'+(anzahl % 1 ? zahlKomma(anzahl) : anzahl)+'</div>'
      + '<div class="rauch-lbl">heute'+(ganze||halbe ? ' · '+ganze+' ganze, '+halbe+' halbe' : '')+'</div>'
    + '</div>'
    + '<div class="btn-row">'
      + '<div class="rauch-b" onclick="rauchen(false)">🚬 Ganze</div>'
      + '<div class="rauch-b halb" onclick="rauchen(true)">🚬 Halbe</div>'
    + '</div>'
    + '<div class="hint" style="text-align:center;margin-top:0.5rem;">'
      + (letzte ? 'letzte um '+fmtT(letzte.ts)+' · vor '+dauerTxt(seit) : 'heute noch keine erfasst')
      + (schnitt7 ? ' · Ø '+zahlKomma(schnitt7)+' pro Tag (7 Tage)' : '')
    + '</div></div>';
}
function zahlKomma(x){ return (Math.round(x*10)/10).toString().replace('.',','); }
function kachel(gid, i){
  const heute = D.eintraege.filter(x=>x.item===i.n && dkey(x.ts)===heuteKey());
  const letzte = heute.length ? heute[heute.length-1] : null;
  const menu = i.menu ? i.menu : 0;
  return '<div class="kachel'+(letzte?' heute-getan':'')+'" onclick="tippen(\''+esc(i.n).replace(/'/g,"\\'")+'\','+menu+',\''+gid+'\')">'
    + '<span class="kic">'+i.ic+'</span><span class="knm">'+esc(i.n)+'</span>'
    + (letzte ? '<span class="kzt">'+fmtT(letzte.ts)+(letzte.dauer?'–'+fmtT(endeVon(letzte)):'')+(heute.length>1?' ·'+heute.length+'×':'')+'</span>' : '')
    + '</div>';
}
function timelineHTML(key){
  const items = [];
  D.schuebe.forEach(x=>{ if(dkey(x.s)===key) items.push({ts:x.s, typ:'sch', o:x}); });
  D.eintraege.forEach(v=>{ if(dkey(v.ts)===key) items.push({ts:v.ts, typ:'ev', o:v}); });
  D.messungen.forEach(m=>{ if(dkey(m.ts)===key) items.push({ts:m.ts, typ:'ms', o:m}); });
  items.sort((a,b)=>a.ts-b.ts);
  if(!items.length) return '<div class="empty"><div class="big">🗒️</div><p>Noch nichts erfasst.</p><p style="font-size:0.8rem;">Beginne mit ☀️ Aufstehen.</p></div>';
  let out = '<div class="tl">';
  items.forEach((it, idx)=>{
    if(idx>0){
      const luecke = it.ts - items[idx-1].ts;
      if(luecke > 90*60000) out += '<div class="tl-luecke">↕ '+dauerTxt(luecke)+'</div>';
    }
    if(it.typ==='sch'){
      const x = it.o, ai = ART_INFO[art(x)];
      const det = [];
      det.push(x.e ? fmtT(x.s)+'–'+fmtT(x.e) : 'seit '+fmtT(x.s));
      if(x.qual && x.qual.length) det.push(x.qual.join(', '));
      if(x.seite) det.push(x.seite);
      if(x.pos) det.push(x.pos);
      if(x.hilf && x.hilf.length) det.push('half: '+x.hilf.join(', '));
      if(x.nz) det.push(x.nz);
      out += '<div class="tl-row ep'+(art(x)==='kribbel'?' kr':'')+'" onclick="schubBearbeiten(\''+x.id+'\')">'
        + '<div class="tl-t">'+fmtT(x.s)+'</div><div class="tl-ic">'+ai.ic+'</div>'
        + '<div class="tl-b"><b>'+ai.n+' · '+(x.e?dauerTxt(schDauer(x)):'läuft')+'</b><small>'+esc(det.join(' · '))+'</small></div></div>';
      return;
    }
    if(it.typ==='ms'){
      const sk = skala(it.o.art);
      out += '<div class="tl-row" onclick="messungLoeschen(\''+it.o.id+'\')">'
        + '<div class="tl-t">'+fmtT(it.ts)+'</div><div class="tl-ic">'+sk.ic+'</div>'
        + '<div class="tl-b">'+sk.n+' '+it.o.wert+'<small>Grundzustand</small></div></div>';
      return;
    }
    const v = it.o, inf = itemInfo(v.item);
    const zusatz = [(v.liste && v.liste.length) ? v.liste.join(', ') : '', v.menge||'', v.detail||''].filter(Boolean).join(' · ');
    const spanne = v.dauer ? fmtT(v.ts)+'–'+fmtT(endeVon(v))+' · '+dauerTxt(v.dauer*60000) : '';
    const unten = [spanne, zusatz].filter(Boolean).join(' · ');
    out += '<div class="tl-row" onclick="eintragBearbeiten(\''+v.id+'\')">'
      + '<div class="tl-t">'+fmtT(v.ts)+'</div><div class="tl-ic">'+inf.ic+'</div>'
      + '<div class="tl-b">'+esc(v.item)+(unten?'<small>'+esc(unten)+'</small>':'')+'</div></div>';
  });
  return out + '</div>';
}

/* ═══════════════ ERFASSEN ═══════════════ */
function tippen(name, menu, gid){
  if(menu===1) return essenMenue(name, null);
  if(menu===2) return listenMenue(name, suppListe(), 'supp', null);
  if(menu===3) return listenMenue(name, medListe(), 'med', null);
  const inf = itemInfo(name);
  const dd = standardDauer(name);
  const ev = {id:uid(), ts:Date.now(), item:name, grp:gid, tags:(inf.t||[]).slice(), liste:[], detail:''};
  if(dd) ev.dauer = dd;
  D.eintraege.push(ev); save();
  toast(inf.ic+' '+name+' · '+fmtT(ev.ts)+(ev.dauer?'–'+fmtT(endeVon(ev)):'')+(schubZu(ev.ts)?' · im Schub':''), ev.id);
  render(true);
}
function essenMenue(mahlzeit, evId){
  const ev = evId ? D.eintraege.find(x=>x.id===evId) : null;
  const gewaehlt = ev ? (ev.liste||[]).slice() : [];
  const zeit = ev ? ev.ts : Date.now();
  let h = '<h3>'+esc(mahlzeit)+'</h3><div class="sub">'+fmtT(zeit)+' Uhr · Mengen gelten als normal</div>';
  essenKatalog().forEach(g=>{
    if(!g.items.length) return;
    h += '<div class="grp-h" style="margin-top:0.6rem;">'+esc(g.g)+'</div><div class="chips" data-essen="1">'
      + g.items.map(i=>'<div class="chip'+(gewaehlt.indexOf(i.n)>=0?' on':'')+'" data-v="'+esc(i.n)+'">'+i.ic+' '+esc(i.n)+'</div>').join('')
      + '</div>';
  });
  h += '<div class="btn-row" style="margin-top:0.7rem;"><div class="a-btn2" onclick="eigenesEssen()">＋ Lebensmittel ergänzen</div></div>'
    + '<div class="field" style="margin-top:0.7rem;"><label>Zeit</label><input type="datetime-local" id="mT" value="'+toLocalInput(zeit)+'"></div>'
    + '<div class="field"><label>Notiz</label><input id="mN" value="'+esc(ev?ev.detail:'')+'" placeholder="optional"></div>'
    + '<div class="ui-btns">'+(ev?'<button class="ui-del" id="bDel">Löschen</button>':'')
    + '<button class="ui-no" id="bAbb">Abbrechen</button><button class="ui-yes" id="bOk">Speichern</button></div>';
  modal(h, el=>{
    el.querySelectorAll('.chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));
    el.querySelector('#bAbb').onclick = closeModal;
    if(ev) el.querySelector('#bDel').onclick = ()=>frage('Diesen Eintrag löschen?','Löschen',()=>{
      D.eintraege = D.eintraege.filter(x=>x.id!==ev.id); save(); closeModal(); render(true);
    });
    el.querySelector('#bOk').onclick = ()=>{
      const liste = Array.from(el.querySelectorAll('.chip.on')).map(c=>c.dataset.v);
      const t = fromLocalInput(el.querySelector('#mT').value) || Date.now();
      const tags = {};
      liste.forEach(n=>(itemInfo(n).t||[]).forEach(x=>tags[x]=1));
      if(ev){
        ev.ts = t; ev.liste = liste; ev.tags = Object.keys(tags); ev.detail = el.querySelector('#mN').value.trim();
      } else {
        D.eintraege.push({id:uid(), ts:t, item:mahlzeit, grp:'essen', liste:liste, tags:Object.keys(tags), detail:el.querySelector('#mN').value.trim()});
      }
      save(); closeModal(); toast(mahlzeit+' gespeichert · '+fmtT(t)); render(true);
    };
  });
}

    + '<div class="field" style="margin-top:0.7rem;"><label>Zeit</label><input type="datetime-local" id="lT" value="'+toLocalInput(zeit)+'"></div>'

      D.eintraege = D.eintraege.filter(x=>x.id!==ev.id); save(); closeModal(); render(true);
    });
    el.querySelector('#bOk').onclick = ()=>{
      const l = Array.from(el.querySelectorAll('.chip.on')).map(c=>c.dataset.v);

      else D.eintraege.push({id:uid(), ts:t, item:titel, grp:'supp', liste:l, tags:[], detail:''});

function eintragBearbeiten(id){
  const ev = D.eintraege.find(x=>x.id===id); if(!ev) return;
  if(ev.grp==='essen') return essenMenue(ev.item, id);
  if(ev.grp==='supp') return listenMenue(ev.item, ev.item==='Medikament'?medListe():suppListe(), ev.item==='Medikament'?'med':'supp', id);
  modal('<h3>'+esc(ev.item)+'</h3>'
    + '<div class="field"><label>Zeitpunkt</label><input type="datetime-local" id="vT" value="'+toLocalInput(ev.ts)+'"></div>'
    + '<div class="field"><label>Dauer in Minuten (0 = Zeitpunkt)</label><input type="number" id="vDa" min="0" step="5" value="'+(ev.dauer||0)+'"></div>'
    + '<label class="merken"><input type="checkbox" id="vStd"> Dauer als Standard für «'+esc(ev.item)+'» merken</label>'
    + '<div class="field"><label>Menge</label><div class="chips" id="cMg">'
    + MENGEN.map(m=>'<div class="chip'+(ev.menge===m?' on':'')+'" data-v="'+esc(m)+'">'+esc(m)+'</div>').join('')+'</div></div>'
    + '<div class="field"><label>Notiz</label><input id="vD" value="'+esc(ev.detail||'')+'" placeholder="optional"></div>'
    + '<div class="ui-btns"><button class="ui-del" id="bDel">Löschen</button><button class="ui-no" id="bAbb">Abbrechen</button><button class="ui-yes" id="bOk">Speichern</button></div>',
    el=>{
      el.querySelectorAll('#cMg .chip').forEach(c=>c.onclick=()=>{
        const an = c.classList.contains('on');
        el.querySelectorAll('#cMg .chip').forEach(x=>x.classList.remove('on'));
        if(!an) c.classList.add('on');
      });
      el.querySelector('#bAbb').onclick = closeModal;
      el.querySelector('#bDel').onclick = ()=>frage('Diesen Eintrag löschen?','Löschen',()=>{
        D.eintraege = D.eintraege.filter(x=>x.id!==ev.id); save(); closeModal(); render(true);
      });
      el.querySelector('#bOk').onclick = ()=>{
        const t = fromLocalInput(el.querySelector('#vT').value);
        if(!t){ info('Bitte einen gültigen Zeitpunkt eingeben.'); return; }
        ev.ts = t; ev.detail = el.querySelector('#vD').value.trim();
        const da = parseInt(el.querySelector('#vDa').value, 10) || 0;
        if(da) ev.dauer = da; else delete ev.dauer;
        if(el.querySelector('#vStd').checked){ dauerMap()[ev.item] = da; }
        el.querySelectorAll('#cMg .chip').forEach(c=>{ if(c.classList.contains('on')) ev.menge = c.dataset.v; });
        if(!el.querySelector('#cMg .chip.on')) delete ev.menge;
        save(); closeModal(); render(true);
      };
    });
}

/* ═══════════════ AUSWERTUNG ═══════════════ */
const WIN = 6;                 /* Beobachtungsfenster nach einem Ereignis, in Stunden */
const MIN_N = 3;               /* ab so vielen Wiederholungen wird gerechnet */

function ersterTs(){
  let t = Infinity;
  D.schuebe.forEach(e=>{ if(e.s<t) t=e.s; });
  D.eintraege.forEach(v=>{ if(v.ts<t) t=v.ts; });
  return t===Infinity ? null : t;
}
function tagListe(){
  const start = ersterTs(); if(!start) return [];
  const out = []; let d = new Date(start); d.setHours(0,0,0,0);
  const ende = new Date(); ende.setHours(0,0,0,0);
  let g = 0;
  while(d.getTime() <= ende.getTime() && g < 3000){
    out.push(dkey(d.getTime()));
    d = new Date(d.getTime()+86400000); d.setHours(0,0,0,0); g++;
  }
  return out;
}
function minutenProTag(liste){
  const m = {};
  (liste || schuebeSort()).forEach(e=>{
    let a = e.s, b = schEnde(e), g = 0;
    while(a < b && g < 400){
      const t0 = new Date(a); t0.setHours(0,0,0,0);
      const bis = Math.min(b, t0.getTime()+86400000);
      m[dkey(a)] = (m[dkey(a)]||0) + (bis-a)/60000;
      a = bis; g++;
    }
  });
  return m;
}
function offsetTxt(ms){
  const m = Math.round(ms/60000);
  if(m < 60) return m+' Min';
  return Math.floor(m/60)+' h '+(m%60?p2(m%60):'00');
}

const STOPP_WIN = 60;          /* Minuten: so lange danach gilt ein Schubende als Reaktion */
function schubZu(ts){ return D.schuebe.find(x=>art(x)==='schub' && ts >= x.s && ts <= schEnde(x)) || null; }
function phaseZu(ts){ return D.schuebe.find(x=>ts >= x.s && ts <= schEnde(x)) || null; }
function ausserhalb(evs){ return evs.filter(v=>!schubZu(v.ts) && !schubZu(endeVon(v))); }
function innerhalb(evs){ return evs.filter(v=>schubZu(v.ts)); }

/* Wie oft folgte auf diese Ereignisse ein Schub – und nach wie langer Zeit? */
function folgeStat(evsRoh){
  const evs = ausserhalb(evsRoh);
  const sch = schuebeSort(), w = WIN*3600000;
  let treffer = 0; const lat = [];
  evs.forEach(v=>{
    const ref = endeVon(v);
    let erster = null;
    sch.forEach(s=>{ if(s.s > ref && s.s <= ref+w && (erster===null || s.s<erster)) erster = s.s; });
    if(erster!==null){ treffer++; lat.push(erster - ref); }
  });
  lat.sort((a,b)=>a-b);
  return {
    n: evs.length, t: treffer,
    q: evs.length ? treffer/evs.length : 0,
    lat: lat.length ? lat.reduce((a,b)=>a+b,0)/lat.length : null,
    med: lat.length ? lat[Math.floor(lat.length/2)] : null,
    schnellste: lat.length ? lat[0] : null,
    sofort: lat.filter(x=>x <= 5*60000).length
  };
}
/* Was geschah WÄHREND eines Schubs – und ging er danach zu Ende? */
function stoppStat(evsRoh){
  const evs = innerhalb(evsRoh);
  let treffer = 0, uebergang = 0; const lat = [];
  evs.forEach(v=>{
    const s = schubZu(v.ts);
    if(s && s.e && s.e >= v.ts && (s.e - v.ts) <= STOPP_WIN*60000){
      treffer++; lat.push(s.e - v.ts);
      if(D.schuebe.some(k=>art(k)==='kribbel' && Math.abs(k.s - s.e) < 3*60000)) uebergang++;
    }
  });
  lat.sort((a,b)=>a-b);
  return { n:evs.length, t:treffer, q:evs.length?treffer/evs.length:0,
    lat: lat.length ? lat.reduce((a,b)=>a+b,0)/lat.length : null,
    schnellste: lat.length ? lat[0] : null,
    uebergang: uebergang,
    sofort: lat.filter(x=>x <= 5*60000).length,
    lats: lat };
}

function stat(v,l){ return '<div class="stat"><div class="sv">'+v+'</div><div class="sl">'+l+'</div></div>'; }

/* ─── Rauchen ─── */
function rauchProTag(){
  const m = {};
  rauchEintraege().forEach(v=>{ m[dkey(v.ts)] = (m[dkey(v.ts)]||0)+rauchWert(v); });
  return m;
}
function abstandZuletzterZigi(sch){
  const r = rauchEintraege().slice().sort((a,b)=>a.ts-b.ts), out = [];
  sch.forEach(s=>{
    let letzte = null;
    r.forEach(v=>{ if(v.ts <= s.s && (letzte===null || v.ts > letzte)) letzte = v.ts; });
    if(letzte !== null && s.s - letzte < 14*3600000) out.push((s.s-letzte)/60000);
  });
  return out;
}
function rauchAnalyseHTML(sch){
  const r = rauchEintraege();
  if(r.length < 5) return '';
  const tage = tagListe(), proTag = rauchProTag(), minTag = minutenProTag();
  const werte = tage.map(k=>proTag[k]||0);
  const schnitt = werte.reduce((a,b)=>a+b,0)/tage.length;
  const sortiert = werte.slice().sort((a,b)=>a-b);
  const median = sortiert[Math.floor(sortiert.length/2)];
  /* obere und untere 40 % der Tage vergleichen – robust auch bei ungleicher Verteilung */
  const rang = tage.map(k=>({k:k, n:proTag[k]||0})).sort((a,b)=>b.n-a.n);
  const gr = Math.max(3, Math.round(tage.length*0.4));
  const obenT = rang.slice(0, Math.min(gr, rang.length));
  const untenT = rang.slice(-Math.min(gr, rang.length));
  const viel = obenT.map(x=>minTag[x.k]||0), wenig = untenT.map(x=>minTag[x.k]||0);
  const zigiOben = obenT.reduce((a,x)=>a+x.n,0)/obenT.length;
  const zigiUnten = untenT.reduce((a,x)=>a+x.n,0)/untenT.length;
  const trennbar = tage.length >= 6 && (zigiOben - zigiUnten) >= 1;
  const mv = viel.length ? viel.reduce((a,b)=>a+b,0)/viel.length : null;
  const mw = wenig.length ? wenig.reduce((a,b)=>a+b,0)/wenig.length : null;

  let h = '<div class="card"><div class="card-h">Rauchen</div>'
    + '<div class="card-sub">Ø '+zahlKomma(schnitt)+' pro Tag über '+tage.length+' Tage · Median '+zahlKomma(median)+'</div>';

  if(trennbar && mv !== null && mw !== null){
    const diff = mv - mw, schlecht = diff > 0;
    const max = Math.max(mv, mw, 1);
    h += '<div class="grp-h">Rauchreiche gegen raucharme Tage</div>'
      + '<div class="frow"><div class="fh"><span class="fn">🚬 mehr geraucht ('+obenT.length+' Tage, Ø '+zahlKomma(zigiOben)+')</span>'
      + '<span class="fv" style="color:'+(schlecht?'#C0392B':'#2E9E5B')+'">'+(diff>0?'+':'')+Math.round(diff)+' Min</span></div>'
      + '<div class="fbar '+(schlecht?'warn':'good')+'"><span style="width:'+Math.round(mv/max*100)+'%"></span></div>'
      + '<div class="fd">mehr: '+Math.round(mv)+' Schubminuten/Tag · weniger: '+Math.round(mw)+' Min/Tag ('+untenT.length+' Tage, Ø '+zahlKomma(zigiUnten)+')</div></div>';
  }

  const ab = abstandZuletzterZigi(sch);
  if(ab.length >= MIN_N){
    const b = [0,0,0,0,0,0], lbl = ['<30 Min','½–1 h','1–2 h','2–4 h','4–8 h','>8 h'];
    ab.forEach(x=>{ if(x<30)b[0]++; else if(x<60)b[1]++; else if(x<120)b[2]++; else if(x<240)b[3]++; else if(x<480)b[4]++; else b[5]++; });
    const max = Math.max.apply(null,b);
    const o = ab.reduce((a,c)=>a+c,0)/ab.length;
    h += '<div class="grp-h">Abstand zur letzten Zigarette bei Schubbeginn</div>'
      + '<div class="chart">'+b.map(v=>'<div class="cb"><i style="height:'+(max?Math.round(v/max*100):0)+'%"></i></div>').join('')+'</div>'
      + '<div class="chart-x">'+lbl.map(l=>'<span>'+l+'</span>').join('')+'</div>'
      + '<div class="hint" style="margin-top:0.35rem;">Ø '+offsetTxt(o*60000)+' nach der letzten Zigarette · '+ab.length+' Schübe. '
      + 'Häufungen bei den langen Abständen sprechen eher für Entzug, Häufungen ganz links eher für die Zigarette selbst.</div>';
  }
  return h + '</div>';
}

/* ─── Grundzustand im Tagesverlauf ─── */
function grundzustandHTML(){
  if(D.messungen.length < 3) return '';
  let h = '<div class="card"><div class="card-h">Grundzustand der Beine</div>'
    + '<div class="card-sub">Alle Messungen, gemittelt nach Tageszeit. Höher = schwerer bzw. unruhiger.</div>';
  SKALEN.forEach(sk=>{
    const ms = D.messungen.filter(m=>m.art===sk.id);
    if(ms.length < 3) return;
    const sum = new Array(12).fill(0), cnt = new Array(12).fill(0);
    ms.forEach(m=>{ const b = Math.floor(new Date(m.ts).getHours()/2); sum[b]+=m.wert; cnt[b]++; });
    const avg = sum.map((x,i)=>cnt[i]?x/cnt[i]:0);
    const o = ms.reduce((a,m)=>a+m.wert,0)/ms.length;
    const letzte7 = ms.filter(m=>m.ts > Date.now()-7*86400000);
    const o7 = letzte7.length ? letzte7.reduce((a,m)=>a+m.wert,0)/letzte7.length : null;
    h += '<div class="grp-h">'+sk.ic+' '+sk.n+'</div>'
      + '<div class="chart">'+avg.map(v=>'<div class="cb"><i style="height:'+Math.round(v/5*100)+'%"></i></div>').join('')+'</div>'
      + '<div class="chart-x">'+avg.map((v,i)=>'<span>'+(i%2===0?(i*2):'')+'</span>').join('')+'</div>'
      + '<div class="hint">Ø '+o.toFixed(1)+' von 5 · '+ms.length+' Messungen'
      + (o7!==null ? ' · letzte 7 Tage: '+o7.toFixed(1)+(o7<o-0.3?' (besser)':(o7>o+0.3?' (schlechter)':'')) : '')+'</div>';
  });
  return h + '</div>';
}

/* ─── Was verändert den Grundzustand? ─── */
const MESS_FENSTER = 2;   /* Stunden vor und nach einem Ereignis */
function wirkungAuf(evs, skalaId){
  const ms = D.messungen.filter(m=>m.art===skalaId);
  const w = MESS_FENSTER*3600000;
  const diffs = [];
  evs.forEach(v=>{
    const ref = endeVon(v);
    let vor = null, nach = null;
    ms.forEach(m=>{
      if(m.ts <= v.ts  && m.ts > v.ts-w  && (!vor  || m.ts > vor.ts))  vor  = m;
      if(m.ts >  ref   && m.ts <= ref+w  && (!nach || m.ts < nach.ts)) nach = m;
    });
    if(vor && nach) diffs.push(nach.wert - vor.wert);
  });
  if(!diffs.length) return null;
  return { n:diffs.length, d:diffs.reduce((a,b)=>a+b,0)/diffs.length };
}
function wirkungHTML(){
  if(D.messungen.length < 4) return '';
  let h = '<div class="card"><div class="card-h">Was verändert den Grundzustand?</div>'
    + '<div class="card-sub">Messung davor gegen Messung danach, je innerhalb '+MESS_FENSTER+' h. Minus = danach leichter bzw. ruhiger. Ab 2 Vergleichen.</div>';
  let leer = true;
  SKALEN.forEach(sk=>{
    const res = [];
    alleDinge().forEach(x=>{
      const r = wirkungAuf(x.evs, sk.id);
      if(r && r.n >= 2) res.push({x:x, r:r});
    });
    if(!res.length) return;
    leer = false;
    res.sort((a,b)=>a.r.d-b.r.d);
    h += '<div class="grp-h">'+sk.ic+' '+sk.n+'</div>' + res.slice(0,10).map(o=>{
      const besser = o.r.d < -0.2, schlechter = o.r.d > 0.2;
      const breite = Math.min(100, Math.abs(o.r.d)/2*100);
      return '<div class="frow"><div class="fh"><span class="fn">'+o.x.ic+' '+esc(o.x.label)+'</span>'
        + '<span class="fv" style="color:'+(besser?'#2E9E5B':(schlechter?'#C0392B':'#0D3E6A'))+'">'+(o.r.d>0?'+':'')+o.r.d.toFixed(1)+'</span></div>'
        + '<div class="fbar '+(besser?'good':(schlechter?'warn':''))+'"><span style="width:'+breite+'%"></span></div>'
        + '<div class="fd">'+o.r.n+' Vergleiche · '+o.x.art+'</div></div>';
    }).join('');
  });
  if(leer) return '';
  return h + '<div class="hint" style="margin-top:0.6rem;">Damit das funktioniert: einmal messen, bevor du etwas tust oder isst – und einmal ein bis zwei Stunden danach.</div></div>';
}

/* ─── Kribbelphasen und Übergänge ─── */
function kribbelHTML(){
  const kr = kribbelPhasen();
  if(!kr.length) return '';
  const abg = kr.filter(x=>x.e);
  const oD = abg.length ? abg.reduce((a,x)=>a+schDauer(x),0)/abg.length : 0;
  let nachSchub = 0;
  kr.forEach(k=>{ if(D.schuebe.some(s=>art(s)==='schub' && s.e && Math.abs(k.s - s.e) < 3*60000)) nachSchub++; });
  return '<div class="card"><div class="card-h">Angenehmes Kribbeln</div>'
    + '<div class="card-sub">Der wohltuende Zustand – oft im Anschluss an einen Schub, manchmal für sich allein.</div>'
    + '<div class="stat-grid">'
    + stat(kr.length,'Phasen') + stat(dauerTxt(oD),'Ø Dauer')
    + stat(nachSchub,'nach einem Schub') + stat(kr.length-nachSchub,'ohne Schub davor')
    + '</div>'
    + wohltuerHTML()
    + '</div>';
}
/* ─── Was bringt das angenehme Kribbeln? ─── */
const KRIBBEL_WIN = 2;   /* Stunden */
function kribbelStat(evs){
  const kr = kribbelPhasen(), w = KRIBBEL_WIN*3600000;
  let treffer = 0; const lat = [];
  evs.forEach(v=>{
    const ref = endeVon(v);
    let erste = null;
    kr.forEach(k=>{ if(k.s >= ref && k.s <= ref+w && (erste===null || k.s<erste)) erste = k.s; });
    if(erste!==null){ treffer++; lat.push(erste - ref); }
  });
  lat.sort((a,b)=>a-b);
  return { n:evs.length, t:treffer, q:evs.length?treffer/evs.length:0,
    lat: lat.length ? lat.reduce((a,b)=>a+b,0)/lat.length : null };
}
function wohltuerHTML(){
  const dinge = alleDinge().map(x=>Object.assign({}, x, {st:kribbelStat(x.evs)})).filter(x=>x.st.n>=MIN_N && x.st.t>0);
  if(!dinge.length) return '';
  dinge.sort((a,b)=>b.st.q-a.st.q);
  return '<div class="grp-h">Worauf folgt das Kribbeln?</div>'
    + '<div class="card-sub">Innerhalb '+KRIBBEL_WIN+' h nach dem Ereignis begann eine Kribbelphase.</div>'
    + dinge.slice(0,10).map(x=>{
      const q = Math.round(x.st.q*100);
      return '<div class="frow"><div class="fh"><span class="fn">'+x.ic+' '+esc(x.label)+'</span>'
        + '<span class="fv" style="color:#2E9E5B">'+q+' %</span></div>'
        + '<div class="fbar good"><span style="width:'+q+'%"></span></div>'
        + '<div class="fd">'+x.st.t+' von '+x.st.n+' Mal'+(x.st.lat!==null?' · Ø nach '+offsetTxt(x.st.lat):'')+' · '+x.art+'</div></div>';
    }).join('');
}

/* ─── Welche Empfindungen treten auf? ─── */
function empfindungHTML(){
  const z = {}, zk = {};
  phasen().forEach(p=>(p.qual||[]).forEach(q=>{
    z[q] = (z[q]||0)+1;
    if(art(p)==='kribbel') zk[q] = (zk[q]||0)+1;
  }));
  const liste = Object.keys(z).map(k=>({k:k, v:z[k], kr:zk[k]||0})).sort((a,b)=>b.v-a.v);
  if(!liste.length) return '';
  const max = liste[0].v;
  return '<div class="card"><div class="card-h">Empfindungen</div>'
    + liste.map(r=>'<div class="frow"><div class="fh"><span class="fn">'+esc(r.k)+'</span><span class="fv">'+r.v+'×</span></div>'
      + '<div class="fbar"><span style="width:'+Math.round(r.v/max*100)+'%"></span></div>'
      + (r.kr?'<div class="fd">'+r.kr+'× davon in einer Kribbelphase</div>':'')+'</div>').join('')
    + '</div>';
}

/* ─── Was war vor dem Schub? ─── */
function vorSchubHTML(sch){
  const letzte = sch.slice().sort((a,b)=>b.s-a.s).slice(0,10);
  let h = '<div class="card"><div class="card-h">Was war vor dem Schub?</div>'
    + '<div class="card-sub">Die letzten Schübe, rückwärts gelesen – alles, was in den '+WIN+' Stunden davor erfasst wurde.</div>';
  h += letzte.map(s=>{
    const vor = D.eintraege.filter(v=>v.ts <= s.s && v.ts > s.s - WIN*3600000).sort((a,b)=>b.ts-a.ts);
    const d = new Date(s.s);
    let z = '<div class="vs"><div class="vs-h">'+TAGE_K[d.getDay()]+', '+p2(d.getDate())+'.'+p2(d.getMonth()+1)+'. · '+fmtT(s.s)
      + (s.e ? ' · '+dauerTxt(schDauer(s)) : ' · läuft')
      + (s.int ? ' · Intensität '+s.int : '') + '</div>';
    if(!vor.length) z += '<div class="vs-l">nichts erfasst in den '+WIN+' h davor</div>';
    else z += vor.map(v=>{
      const inf = itemInfo(v.item);
      const txt = (v.liste && v.liste.length) ? v.item+': '+v.liste.join(', ') : v.item;
      return '<div class="vs-l"><b>−'+offsetTxt(s.s-v.ts)+'</b> '+inf.ic+' '+esc(txt)+'</div>';
    }).join('');
    const drin = D.eintraege.filter(v=>v.ts > s.s && v.ts <= schEnde(s)).sort((a,b)=>a.ts-b.ts);
    if(drin.length) z += '<div class="vs-d">' + drin.map(v=>{
      const inf = itemInfo(v.item);
      const txt = (v.liste && v.liste.length) ? v.item+': '+v.liste.join(', ') : v.item;
      const bis = s.e ? ' · Ende '+offsetTxt(Math.max(0, s.e-v.ts))+' später' : '';
      return '<div class="vs-l"><b>+'+offsetTxt(v.ts-s.s)+'</b> '+inf.ic+' '+esc(txt)+bis+'</div>';
    }).join('') + '</div>';
    if(s.verlauf && s.verlauf.length > 1)
      z += '<div class="vs-l" style="margin-top:0.25rem;">Intensität: '+s.verlauf.map(p=>fmtT(p.ts)+' → '+p.int).join(' · ')+'</div>';
    return z + '</div>';
  }).join('');
  return h + '</div>';
}

/* ─── Verzögerung pro Ding ─── */
function verzoegerungHTML(){
  const dinge = alleDinge().map(x=>Object.assign(x, {st:folgeStat(x.evs)})).filter(x=>x.st.n >= MIN_N && x.st.t > 0);
  let h = '<div class="card"><div class="card-h">Wie schnell folgt ein Schub?</div>'
    + '<div class="card-sub">Nur was mindestens '+MIN_N+'× erfasst wurde und <b>ausserhalb</b> eines laufenden Schubs. «6 von 9» heisst: nach 6 dieser 9 Male begann innerhalb '+WIN+' h ein Schub. Bei Einträgen mit Dauer – etwa dem Mittagsschlaf – wird ab dem <b>Ende</b> gerechnet.</div>';
  if(!dinge.length) return h + '<div class="hint">Noch zu wenig Wiederholungen. Ein paar Tage konsequent tippen, dann füllt sich das hier.</div></div>';
  dinge.sort((a,b)=> (a.st.lat - b.st.lat) || (b.st.q - a.st.q));
  return h + dinge.map(x=>{
    const q = Math.round(x.st.q*100);
    const sofort = x.st.lat !== null && x.st.lat <= 5*60000;
    const warn = x.st.q >= 0.5 && x.st.n >= MIN_N;
    const det = [x.st.t+' von '+x.st.n+' Mal ('+q+' %)'];
    if(x.st.sofort) det.push(x.st.sofort+'× innert 5 Min');
    if(x.st.schnellste !== null) det.push('schnellste '+offsetTxt(x.st.schnellste));
    if(x.st.med !== null) det.push('Median '+offsetTxt(x.st.med));
    det.push(x.art);
    return '<div class="frow"><div class="fh"><span class="fn">'+x.ic+' '+esc(x.label)+(sofort?' ⚡':'')+'</span>'
      + '<span class="fv" style="color:'+(warn||sofort?'#C0392B':'#0D3E6A')+'">'+(sofort?'sofort':(x.st.lat!==null?'nach '+offsetTxt(x.st.lat):'–'))+'</span></div>'
      + '<div class="fbar '+(warn||sofort?'warn':'')+'"><span style="width:'+q+'%"></span></div>'
      + '<div class="fd">'+det.join(' · ')+'</div></div>';
  }).join('')
  + '<div class="hint" style="margin-top:0.6rem;">⚡ heisst: im Schnitt innert 5 Minuten. So schnell kann nichts über die Verdauung wirken – das läuft über Nerven, Geschmack, Temperatur oder Reflex.</div></div>';
}
/* ─── Was bisher nie einen Schub nach sich zog ─── */
function unauffaelligHTML(){
  const dinge = alleDinge().map(x=>Object.assign(x, {st:folgeStat(x.evs)})).filter(x=>x.st.n >= MIN_N && x.st.t === 0);
  if(!dinge.length) return '';
  dinge.sort((a,b)=>b.st.n-a.st.n);
  return '<div class="card"><div class="card-h">Bisher unauffällig</div>'
    + '<div class="card-sub">Danach kam in den '+WIN+' h nie ein Schub. Auch das ist ein Ergebnis – es engt den Kreis ein.</div>'
    + '<div class="chips">'+dinge.map(x=>'<div class="chip">'+x.ic+' '+esc(x.label)+' · '+x.st.n+'×</div>').join('')+'</div></div>';
}

/* ─── Was einen laufenden Schub beendet hat ─── */
function beenderHTML(){
  const dinge = alleDinge().map(x=>Object.assign({}, x, {st:stoppStat(x.evs)})).filter(x=>x.st.n >= 2 && x.st.t > 0);
  let h = '<div class="card"><div class="card-h">Was hat einen laufenden Schub beendet?</div>'
    + '<div class="card-sub">Nur was <b>während</b> eines Schubs getippt wurde. Sortiert nach Tempo – je schneller die Wirkung, desto eher läuft sie über Nerven und Reize statt über die Verdauung.</div>';
  if(!dinge.length) return h + '<div class="hint">Sobald du während eines Schubs etwas tippst – Glace, Gehen, Dusche – füllt sich das hier.</div></div>';
  dinge.sort((a,b)=>(a.st.lat-b.st.lat) || (b.st.q-a.st.q));
  return h + dinge.map(x=>{
    const q = Math.round(x.st.q*100);
    const sofort = x.st.lat !== null && x.st.lat <= 5*60000;
    const kopf = sofort ? 'sofort' : 'Ende nach '+offsetTxt(x.st.lat);
    const det = [];
    det.push(x.st.t+' von '+x.st.n+' Mal ('+q+' %)');
    if(x.st.sofort) det.push(x.st.sofort+'× innert 5 Min');
    if(x.st.schnellste !== null) det.push('schnellste Reaktion '+offsetTxt(x.st.schnellste));
    if(x.st.uebergang) det.push(x.st.uebergang+'× ging es in angenehmes Kribbeln über');
    det.push(x.art);
    return '<div class="frow"><div class="fh"><span class="fn">'+x.ic+' '+esc(x.label)+(sofort?' ⚡':'')+'</span>'
      + '<span class="fv" style="color:#2E9E5B">'+kopf+'</span></div>'
      + '<div class="fbar good"><span style="width:'+q+'%"></span></div>'
      + '<div class="fd">'+det.join(' · ')+'</div></div>';
  }).join('')
  + '<div class="hint" style="margin-top:0.6rem;">⚡ heisst: im Schnitt innert 5 Minuten vorbei. Bei Gegessenem spricht das für einen Reiz – Kälte, Schlucken, Ablenkung – nicht für den Inhalt.</div></div>';
}

/* ─── Dinge, die beides können ─── */
function doppelrolleHTML(){
  const res = [];
  alleDinge().forEach(x=>{
    const a = folgeStat(x.evs), b = stoppStat(x.evs);
    if(a.t > 0 && b.t > 0) res.push({x:x, a:a, b:b});
  });
  if(!res.length) return '';
  return '<div class="card"><div class="card-h">Zwei Gesichter</div>'
    + '<div class="card-sub">Das hier hat schon beides ausgelöst und beendet. Nicht die Sache allein entscheidet – sondern womöglich der Moment, in dem sie kommt.</div>'
    + res.map(r=>'<div class="frow"><div class="fh"><span class="fn">'+r.x.ic+' '+esc(r.x.label)+'</span></div>'
      + '<div class="fbar" style="background:transparent;height:auto;display:block;"></div>'
      + '<div class="fd"><b style="color:#C0392B;">'+r.a.t+'× ausgelöst</b> (von '+r.a.n+' Mal ausserhalb, Ø nach '+(r.a.lat!==null?offsetTxt(r.a.lat):'–')+')'
      + ' · <b style="color:#2E9E5B;">'+r.b.t+'× beendet</b> (von '+r.b.n+' Mal im Schub, Ø nach '+(r.b.lat!==null?offsetTxt(r.b.lat):'–')+(r.b.schnellste!==null?', schnellste '+offsetTxt(r.b.schnellste):'')+')</div></div>').join('')
    + '</div>';
}

/* ─── Zusammensetzung der Mahlzeiten ─── */
function zusammensetzungHTML(){
  const m = mahlzeiten();
  let h = '<div class="card"><div class="card-h">Zusammensetzung des Essens</div>'
    + '<div class="card-sub">Nicht das einzelne Lebensmittel, sondern der Bestandteil: Anteil der Mahlzeiten mit einem Schub danach – mit dem Bestandteil gegenüber ohne.</div>';
  if(m.length < 6) return h + '<div class="hint">Ab ca. 6 erfassten Mahlzeiten erscheint die Auswertung.</div></div>';
  const res = [];
  TAGS_ALLE.forEach(t=>{
    const mit = m.filter(v=>(v.tags||[]).indexOf(t)>=0), ohne = m.filter(v=>(v.tags||[]).indexOf(t)<0);
    if(mit.length < MIN_N || ohne.length < MIN_N) return;
    const a = folgeStat(mit), b = folgeStat(ohne);
    if(a.n < MIN_N || b.n < MIN_N) return;
    res.push({t:t, a:a, b:b, diff:a.q-b.q});
  });
  if(!res.length) return h + '<div class="hint">Es braucht Mahlzeiten mit und ohne den jeweiligen Bestandteil.</div></div>';
  res.sort((a,b)=>b.diff-a.diff);
  return h + res.map(r=>{
    const pm = Math.round(r.a.q*100), po = Math.round(r.b.q*100);
    const schlecht = r.diff > 0.15, gut = r.diff < -0.15;
    return '<div class="frow"><div class="fh"><span class="fn">'+esc(r.t)+'</span>'
      + '<span class="fv" style="color:'+(schlecht?'#C0392B':(gut?'#2E9E5B':'#0D3E6A'))+'">'+pm+' % vs '+po+' %</span></div>'
      + '<div class="fbar '+(schlecht?'warn':(gut?'good':''))+'"><span style="width:'+pm+'%"></span></div>'
      + '<div class="fd">mit: '+r.a.t+' von '+r.a.n+(r.a.lat!==null?', Ø nach '+offsetTxt(r.a.lat):'')+' · ohne: '+r.b.t+' von '+r.b.n+'</div></div>';
  }).join('') + '</div>';
}

/* ─── Tage mit / ohne ─── */
function tagesvergleichHTML(){
  const tage = tagListe(), minTag = minutenProTag(), res = [];
  alleDinge().forEach(x=>{
    const tageMit = {};
    x.evs.forEach(v=>tageMit[dkey(v.ts)] = 1);
    const mit = [], ohne = [];
    tage.forEach(k=>{ (tageMit[k]?mit:ohne).push(minTag[k]||0); });
    if(mit.length < MIN_N || ohne.length < MIN_N) return;
    const mm = mit.reduce((a,b)=>a+b,0)/mit.length, mo = ohne.reduce((a,b)=>a+b,0)/ohne.length;
    res.push({x:x, mit:mm, ohne:mo, diff:mm-mo, tage:mit.length});
  });
  let h = '<div class="card"><div class="card-h">Tage mit / ohne – Schubminuten</div>'
    + '<div class="card-sub">Der Blick auf den ganzen Tag statt auf die Stunde danach. Rot = an diesen Tagen mehr Symptomzeit, Grün = weniger.</div>';
  if(!res.length) return h + '<div class="hint">Ab je '+MIN_N+' Tagen mit und ohne erscheint der Vergleich.</div></div>';
  res.sort((a,b)=>b.diff-a.diff);
  const max = Math.max.apply(null, res.map(r=>Math.max(r.mit,r.ohne,1)));
  return h + res.slice(0,14).map(r=>{
    const schlecht = r.diff > 0;
    return '<div class="frow"><div class="fh"><span class="fn">'+r.x.ic+' '+esc(r.x.label)+'</span>'
      + '<span class="fv" style="color:'+(schlecht?'#C0392B':'#2E9E5B')+'">'+(schlecht?'+':'')+Math.round(r.diff)+' Min</span></div>'
      + '<div class="fbar '+(schlecht?'warn':'good')+'"><span style="width:'+Math.round(r.mit/max*100)+'%"></span></div>'
      + '<div class="fd">mit: '+Math.round(r.mit)+' Min/Tag ('+r.tage+' Tage) · ohne: '+Math.round(r.ohne)+' Min/Tag</div></div>';
  }).join('') + '</div>';
}

/* ─── Tageszeit ─── */
function tageszeitHTML(sch){
  const std = new Array(24).fill(0);
  sch.forEach(e=>std[new Date(e.s).getHours()]++);
  const max = Math.max.apply(null, std);
  const abends = sch.filter(e=>{ const st = new Date(e.s).getHours(); return st>=22 || st<3; }).length;
  const q = Math.round(abends/sch.length*100);
  const top = std.map((v,i)=>({v:v,i:i})).sort((a,b)=>b.v-a.v).slice(0,3).filter(x=>x.v>0);
  return '<div class="card"><div class="card-h">Wann beginnen die Schübe?</div>'
    + '<div class="chart">'+std.map(v=>'<div class="cb"><i style="height:'+(max?Math.round(v/max*100):0)+'%"></i></div>').join('')+'</div>'
    + '<div class="chart-x">'+std.map((v,i)=>'<span>'+(i%3===0?i:'')+'</span>').join('')+'</div>'
    + '<div class="frow" style="margin-top:0.5rem;"><div class="fh"><span class="fn">Ab 22 Uhr bis 3 Uhr</span><span class="fv">'+q+' %</span></div>'
    + '<div class="fbar"><span style="width:'+q+'%"></span></div>'
    + '<div class="fd">'+abends+' von '+sch.length+' Schüben · die übrigen '+(100-q)+' % verteilen sich über den Tag</div></div>'
    + (top.length?'<div class="hint" style="margin-top:0.4rem;">Häufigste Startzeiten: '+top.map(t=>t.i+':00 ('+t.v+'×)').join(', ')+'</div>':'')
    + '</div>';
}

/* ─── Abstand zur letzten Mahlzeit ─── */
function mahlzeitAbstandHTML(sch){
  const m = mahlzeiten(), abst = [];
  sch.forEach(s=>{
    let letzte = null;
    m.forEach(v=>{ if(v.ts <= s.s && (letzte===null || v.ts > letzte)) letzte = v.ts; });
    if(letzte !== null && s.s - letzte < 12*3600000) abst.push((s.s-letzte)/3600000);
  });
  let h = '<div class="card"><div class="card-h">Abstand zur letzten Mahlzeit</div>';
  if(abst.length < MIN_N) return h + '<div class="hint">Ab '+MIN_N+' Schüben mit vorher erfasster Mahlzeit erscheint die Auswertung.</div></div>';
  const o = abst.reduce((a,b)=>a+b,0)/abst.length;
  const b = [0,0,0,0,0,0], lbl = ['<30 Min','½–1 h','1–2 h','2–3 h','3–5 h','>5 h'];
  abst.forEach(x=>{ if(x<0.5)b[0]++; else if(x<1)b[1]++; else if(x<2)b[2]++; else if(x<3)b[3]++; else if(x<5)b[4]++; else b[5]++; });
  const max = Math.max.apply(null,b);
  return h + '<div class="card-sub">Ø '+o.toFixed(1)+' Stunden nach dem Essen · '+abst.length+' Schübe ausgewertet</div>'
    + '<div class="chart">'+b.map(v=>'<div class="cb"><i style="height:'+(max?Math.round(v/max*100):0)+'%"></i></div>').join('')+'</div>'
    + '<div class="chart-x">'+lbl.map(l=>'<span>'+l+'</span>').join('')+'</div></div>';
}

/* ─── Stunden nach dem Aufstehen ─── */
function aufstehenHTML(sch){
  const auf = {};
  D.eintraege.forEach(v=>{ if(v.item==='Aufstehen'){ const k=dkey(v.ts); if(!auf[k] || v.ts<auf[k]) auf[k]=v.ts; } });
  const werte = [];
  sch.forEach(s=>{ const a = auf[dkey(s.s)]; if(a && s.s>=a) werte.push((s.s-a)/3600000); });
  if(werte.length < MIN_N) return '';
  const b = new Array(8).fill(0);
  werte.forEach(x=>b[Math.min(7, Math.floor(x/2))]++);
  const max = Math.max.apply(null,b);
  const o = werte.reduce((a,c)=>a+c,0)/werte.length;
  return '<div class="card"><div class="card-h">Stunden nach dem Aufstehen</div>'
    + '<div class="card-sub">Ø '+o.toFixed(1)+' h nach dem Aufstehen · '+werte.length+' Schübe</div>'
    + '<div class="chart">'+b.map(v=>'<div class="cb"><i style="height:'+(max?Math.round(v/max*100):0)+'%"></i></div>').join('')+'</div>'
    + '<div class="chart-x">'+['0–2','2–4','4–6','6–8','8–10','10–12','12–14','14+'].map(l=>'<span>'+l+'</span>').join('')+'</div></div>';
}

/* ─── Was hat geholfen ─── */
function hilftHTML(sch){
  const z = {};
  sch.forEach(e=>(e.hilf||[]).forEach(x=>z[x]=(z[x]||0)+1));
  const liste = Object.keys(z).map(k=>({k:k,v:z[k]})).sort((a,b)=>b.v-a.v);
  if(!liste.length) return '';
  const max = liste[0].v;
  return '<div class="card"><div class="card-h">Was hat geholfen?</div>'
    + liste.map(r=>'<div class="frow"><div class="fh"><span class="fn">'+esc(r.k)+'</span><span class="fv">'+r.v+'×</span></div>'
      + '<div class="fbar good"><span style="width:'+Math.round(r.v/max*100)+'%"></span></div></div>').join('')
    + '</div>';
}

/* ═══════════════ BERICHT ═══════════════ */
let BER_TAGE = 14, BER_VOLL = true;
function setBerTage(n){ BER_TAGE = n; render(true); }
function setBerVoll(v){ BER_VOLL = v; render(true); }

function zahl(x, k){ return (Math.round(x*Math.pow(10,k||1))/Math.pow(10,k||1)).toString().replace('.',','); }
function dtxtKurz(ts){ const d=new Date(ts); return TAGE_K[d.getDay()]+' '+p2(d.getDate())+'.'+p2(d.getMonth()+1)+'.'; }

function berichtText(){
  const alle = tagListe();
  const tage = BER_TAGE ? alle.slice(-BER_TAGE) : alle;
  if(!tage.length) return 'Noch keine Daten erfasst.';
  const von = new Date(tage[0]+'T00:00').getTime();
  const bis = new Date(tage[tage.length-1]+'T23:59').getTime();
  const imZeitraum = x => x >= von && x <= bis;

  const sch = schuebeSort().filter(x=>imZeitraum(x.s));
  const kr  = kribbelPhasen().filter(x=>imZeitraum(x.s));
  const eint = D.eintraege.filter(v=>imZeitraum(v.ts));
  const mess = D.messungen.filter(m=>imZeitraum(m.ts));
  const minTag = minutenProTag(), minKr = minutenProTag(kribbelPhasen());
  const summe = tage.reduce((a,k)=>a+(minTag[k]||0),0);
  const summeKr = tage.reduce((a,k)=>a+(minKr[k]||0),0);
  const abg = sch.filter(x=>x.e);
  const oD = abg.length ? abg.reduce((a,x)=>a+schDauer(x),0)/abg.length : 0;
  const frei = tage.filter(k=>!minTag[k]).length;
  const nachts = sch.filter(x=>{ const st=new Date(x.s).getHours(); return st>=22 || st<3; }).length;

  const L = [];
  L.push('TAGESABLAUF – AUSWERTUNGSDATEN FÜR CLAUDE');
  L.push('erstellt: '+dtxtKurz(Date.now())+' '+fmtT(Date.now()));
  L.push('Zeitraum: '+dtxtKurz(von)+' bis '+dtxtKurz(bis)+' ('+tage.length+' Tage)');
  L.push('');
  L.push('== ÜBERSICHT ==');
  L.push('Schübe: '+sch.length+' | Ø Dauer: '+dauerTxt(oD));
  L.push('Schubzeit gesamt: '+Math.round(summe)+' Min (Ø '+Math.round(summe/tage.length)+' Min/Tag) | schubfreie Tage: '+frei+' von '+tage.length);
  L.push('Angenehmes Kribbeln: '+kr.length+' Phasen | '+Math.round(summeKr)+' Min gesamt');
  L.push('Schubbeginn zwischen 22 und 3 Uhr: '+nachts+' von '+sch.length+(sch.length?' ('+Math.round(nachts/sch.length*100)+' %)':''));
  SKALEN.forEach(sk=>{
    const ms = mess.filter(m=>m.art===sk.id);
    if(!ms.length) return;
    const o = ms.reduce((a,m)=>a+m.wert,0)/ms.length;
    const l7 = ms.filter(m=>m.ts > Date.now()-7*86400000);
    L.push('Grundzustand '+sk.n+': Ø '+zahl(o)+' von 5 ('+ms.length+' Messungen)'
      + (l7.length ? ' | letzte 7 Tage: '+zahl(l7.reduce((a,m)=>a+m.wert,0)/l7.length) : ''));
  });
  const rProTag = rauchProTag();
  const rSumme = tage.reduce((a,k)=>a+(rProTag[k]||0),0);
  if(rSumme) L.push('Rauchen: Ø '+zahlKomma(rSumme/tage.length)+' Zigaretten/Tag ('+zahlKomma(rSumme)+' im Zeitraum)');
  if(rSumme){
    const rang = tage.map(k=>({k:k, n:rProTag[k]||0})).sort((a,b)=>b.n-a.n);
    const gr = Math.max(3, Math.round(tage.length*0.4));
    const ob = rang.slice(0, Math.min(gr, rang.length)), un = rang.slice(-Math.min(gr, rang.length));
    const zo = ob.reduce((a,x)=>a+x.n,0)/ob.length, zu = un.reduce((a,x)=>a+x.n,0)/un.length;
    if(tage.length >= 6 && (zo-zu) >= 1){
      const so = ob.reduce((a,x)=>a+(minTag[x.k]||0),0)/ob.length;
      const su = un.reduce((a,x)=>a+(minTag[x.k]||0),0)/un.length;
      L.push('Rauchreiche Tage (Ø '+zahlKomma(zo)+' Zig.): '+Math.round(so)+' Schubmin/Tag | raucharme Tage (Ø '+zahlKomma(zu)+' Zig.): '+Math.round(su)+' Schubmin/Tag');
    }
  }
  const abz = abstandZuletzterZigi(sch);
  if(abz.length >= MIN_N) L.push('Abstand zur letzten Zigarette bei Schubbeginn: Ø '+offsetTxt(abz.reduce((a,b)=>a+b,0)/abz.length*60000)
    + ' | kürzester '+offsetTxt(Math.min.apply(null,abz)*60000)+' | längster '+offsetTxt(Math.max.apply(null,abz)*60000));
  L.push('Einträge im Zeitraum: '+eint.length);
  L.push('');

  L.push('== AUSLÖSER (ausserhalb eines Schubs, Fenster '+WIN+' h, ab '+MIN_N+' Erfassungen) ==');
  const aus = alleDinge().map(x=>Object.assign({}, x, {st:folgeStat(x.evs)})).filter(x=>x.st.n>=MIN_N && x.st.t>0)
    .sort((a,b)=>a.st.lat-b.st.lat);
  if(!aus.length) L.push('– noch keine Auffälligkeit –');
  aus.forEach(x=>L.push('· '+x.label+' ['+x.art+']: '+x.st.t+' von '+x.st.n+' ('+Math.round(x.st.q*100)+' %)'
    + ' | Ø nach '+offsetTxt(x.st.lat) + (x.st.schnellste!==null?' | schnellste '+offsetTxt(x.st.schnellste):'')
    + (x.st.sofort?' | '+x.st.sofort+'× innert 5 Min':'')));
  L.push('');

  L.push('== BEENDER (während eines Schubs getippt, Fenster '+STOPP_WIN+' Min) ==');
  const be = alleDinge().map(x=>Object.assign({}, x, {st:stoppStat(x.evs)})).filter(x=>x.st.n>=2 && x.st.t>0)
    .sort((a,b)=>a.st.lat-b.st.lat);
  if(!be.length) L.push('– noch nichts erfasst –');
  be.forEach(x=>L.push('· '+x.label+' ['+x.art+']: '+x.st.t+' von '+x.st.n+' ('+Math.round(x.st.q*100)+' %)'
    + ' | Ø Ende nach '+offsetTxt(x.st.lat) + (x.st.uebergang?' | '+x.st.uebergang+'× Übergang in angenehmes Kribbeln':'')));
  L.push('');

  L.push('== BESTANDTEILE DER MAHLZEITEN (mit vs. ohne) ==');
  const m = mahlzeiten();
  let hatTags = false;
  TAGS_ALLE.forEach(t=>{
    const mit = m.filter(v=>(v.tags||[]).indexOf(t)>=0), ohne = m.filter(v=>(v.tags||[]).indexOf(t)<0);
    if(mit.length < MIN_N || ohne.length < MIN_N) return;
    const a = folgeStat(mit), b = folgeStat(ohne);
    if(a.n < MIN_N || b.n < MIN_N) return;
    hatTags = true;
    L.push('· '+t+': mit '+Math.round(a.q*100)+' % ('+a.t+'/'+a.n+') vs ohne '+Math.round(b.q*100)+' % ('+b.t+'/'+b.n+')'
      + (a.lat!==null?' | Ø nach '+offsetTxt(a.lat):''));
  });
  if(!hatTags) L.push('– noch zu wenig Mahlzeiten –');
  L.push('');

  L.push('== VERÄNDERUNG DES GRUNDZUSTANDS (Messung davor vs. danach, ± = Punkte von 5) ==');
  let hatW = false;
  SKALEN.forEach(sk=>{
    const res = [];
    alleDinge().forEach(x=>{ const r = wirkungAuf(x.evs, sk.id); if(r && r.n>=2) res.push({x:x, r:r}); });
    if(!res.length) return;
    hatW = true;
    res.sort((a,b)=>a.r.d-b.r.d);
    L.push('-- '+sk.n+' --');
    res.forEach(o=>L.push('· '+o.x.label+': '+(o.r.d>0?'+':'')+zahl(o.r.d)+' ('+o.r.n+' Vergleiche)'));
  });
  if(!hatW) L.push('– noch zu wenig Messpaare –');
  L.push('');

  const unauf = alleDinge().map(x=>Object.assign({}, x, {st:folgeStat(x.evs)})).filter(x=>x.st.n>=MIN_N && x.st.t===0);
  if(unauf.length){
    L.push('== BISHER OHNE SCHUB DANACH ==');
    L.push(unauf.map(x=>x.label+' ('+x.st.n+'×)').join(', '));
    L.push('');
  }
  const zh = {}, zq = {};
  sch.concat(kr).forEach(x=>{
    (x.hilf||[]).forEach(k=>zh[k]=(zh[k]||0)+1);
    (x.qual||[]).forEach(k=>zq[k]=(zq[k]||0)+1);
  });
  if(Object.keys(zq).length){ L.push('== EMPFINDUNGEN =='); L.push(Object.keys(zq).sort((a,b)=>zq[b]-zq[a]).map(k=>k+' '+zq[k]+'×').join(', ')); L.push(''); }
  if(Object.keys(zh).length){ L.push('== WAS GEHOLFEN HAT =='); L.push(Object.keys(zh).sort((a,b)=>zh[b]-zh[a]).map(k=>k+' '+zh[k]+'×').join(', ')); L.push(''); }

  if(BER_VOLL){
    L.push('== TAGESPROTOKOLL ==');
    L.push('(Zeit | Eintrag; SCHUB und KRIBBELN mit Dauer und Details)');
    tage.forEach(k=>{
      const d = new Date(k+'T12:00');
      const zeile = [];
      D.schuebe.forEach(x=>{ if(dkey(x.s)===k) zeile.push({ts:x.s, typ:'p', o:x}); });
      D.eintraege.forEach(v=>{ if(dkey(v.ts)===k && v.grp!=='rauchen') zeile.push({ts:v.ts, typ:'e', o:v}); });
      D.messungen.forEach(mm=>{ if(dkey(mm.ts)===k) zeile.push({ts:mm.ts, typ:'m', o:mm}); });
      zeile.sort((a,b)=>a.ts-b.ts);
      L.push('');
      L.push('--- '+dtxtKurz(new Date(k+'T12:00').getTime())+' | Schub '+Math.round(minTag[k]||0)+' Min, Kribbeln '+Math.round(minKr[k]||0)+' Min'
        + (rProTag[k] ? ' | Zigaretten '+zahlKomma(rProTag[k]) : '')+' ---');
      const zigis = D.eintraege.filter(v=>v.grp==='rauchen' && dkey(v.ts)===k).sort((a,b)=>a.ts-b.ts);
      if(zigis.length) L.push('  Zigaretten: '+zigis.map(v=>fmtT(v.ts)+(v.item==='Halbe Zigarette'?' (halb)':'')).join(', '));
      if(!zeile.length){ L.push('  (nichts erfasst)'); return; }
      zeile.forEach(it=>{
        if(it.typ==='p'){
          const x = it.o, det = [];
          if(x.qual && x.qual.length) det.push(x.qual.join('/'));
          if(x.seite) det.push(x.seite);
          if(x.pos) det.push(x.pos);
          if(x.hilf && x.hilf.length) det.push('half: '+x.hilf.join('/'));
          if(x.nz) det.push('Notiz: '+x.nz);
          L.push('  '+fmtT(x.s)+' '+(art(x)==='schub'?'SCHUB':'KRIBBELN')+' '+(x.e?'bis '+fmtT(x.e)+' ('+dauerTxt(schDauer(x))+')':'(offen)')
            + (det.length?' – '+det.join(', '):''));
        } else if(it.typ==='m'){
          L.push('  '+fmtT(it.ts)+' Messung '+skala(it.o.art).n+' '+it.o.wert+'/5');
        } else {
          const v = it.o;
          const zus = [(v.liste||[]).join(', '), v.menge||'', v.detail||''].filter(Boolean).join(', ');
          L.push('  '+fmtT(v.ts)+(v.dauer?'-'+fmtT(endeVon(v)):'')+' '+v.item+(zus?': '+zus:''));
        }
      });
    });
  }
  L.push('');
  L.push('== ENDE ==');
  return L.join('\n');
}

function berichtKopieren(){
  const ta = document.getElementById('berichtText');
  const txt = ta ? ta.value : berichtText();
  const fertig = ()=>{ const e=document.getElementById('bstat'); if(e) e.textContent='Text kopiert – jetzt im Chat einfügen.'; };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(fertig).catch(()=>{ if(ta){ ta.removeAttribute('readonly'); ta.select(); document.execCommand('copy'); ta.setAttribute('readonly','readonly'); fertig(); } });
  } else if(ta){
    ta.removeAttribute('readonly'); ta.select(); document.execCommand('copy'); ta.setAttribute('readonly','readonly'); fertig();
  }
}

  const anz = {}; D.schuebe.forEach(s=>anz[dkey(s.s)] = (anz[dkey(s.s)]||0)+1);

    + '<div class="card"><div class="card-h">Eigene Ergänzungen</div>'+(eig || '<div class="hint">Noch nichts ergänzt.</div>')

function eigenesLoeschen(k, i){
  frage('Aus der Auswahl entfernen?','Entfernen',()=>{ D.eigene[k].splice(i,1); save(); render(true); });
}
function dl(name, text, typ){
  const b = new Blob([text], {type:typ||'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function bstat(t){ const el = document.getElementById('bstat'); if(el) el.textContent = t; }
function exportJSON(){
  dl('tagesablauf-sicherung-'+dkey(Date.now())+'.json', JSON.stringify({app:'tagesablauf', v:2, ts:new Date().toISOString(), data:D}, null, 1));
  bstat('Sicherung erstellt.');
}
function importJSON(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange = ()=>{
    const f = inp.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try {
        const o = JSON.parse(r.result), neu = o.data || o;
        if(!neu.schuebe && !neu.eintraege) throw new Error('Format');
        frage('Sicherung einlesen? Die aktuellen Daten auf diesem Gerät werden ersetzt.','Einlesen',()=>{
          D = { schuebe:neu.schuebe||[], eintraege:neu.eintraege||[], messungen:neu.messungen||[], tage:neu.tage||{}, eigene:neu.eigene||{}, v:2 };
          save(); render(); bstat('Sicherung eingelesen.');
        });
      } catch(e){ info('Diese Datei konnte nicht gelesen werden. Bitte eine Sicherungsdatei dieser App wählen.'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function csvZ(v){ return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'; }
function exportCSVs(){
  const kopf = ['Datum','Start','Ende','Dauer_Min','Intensitaet','Seite','Position','Half','Notiz'];
  const rows = schuebeSort().map(e=>[dkey(e.s), fmtT(e.s), e.e?fmtT(e.e):'', e.e?Math.round(schDauer(e)/60000):'',
    e.int||'', e.seite||'', e.pos||'', (e.hilf||[]).join(' / '), e.nz||''].map(csvZ).join(';'));
  dl('tagesablauf-schuebe.csv','\ufeff'+kopf.join(';')+'\n'+rows.join('\n'),'text/csv');
  bstat('CSV erstellt.');
}
function exportCSVe(){
  const kopf = ['Datum','Zeit','Eintrag','Details','Bestandteile'];
  const rows = D.eintraege.slice().sort((a,b)=>a.ts-b.ts).map(v=>[dkey(v.ts), fmtT(v.ts), v.item,
    (v.liste||[]).join(' / ') + (v.menge?' | '+v.menge:'') + (v.detail?' | '+v.detail:''), (v.tags||[]).join(' / ')].map(csvZ).join(';'));
  const mrows = D.messungen.slice().sort((a,b)=>a.ts-b.ts).map(m=>[dkey(m.ts), fmtT(m.ts), skala(m.art).n, m.wert, 'Grundzustand'].map(csvZ).join(';'));
  dl('tagesablauf-eintraege.csv','\ufeff'+kopf.join(';')+'\n'+rows.concat(mrows).join('\n'),'text/csv');
  bstat('CSV erstellt.');
}
function alleLoeschen(){
  frage('Wirklich alle Daten löschen? Das lässt sich nur über eine Sicherung rückgängig machen.','Alles löschen',()=>{
    D = { schuebe:[], eintraege:[], messungen:[], tage:{}, eigene:{}, v:2 };
    save(); render();
  });
}
